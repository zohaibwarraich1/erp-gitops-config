apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.tenant }}-db
  labels:
    app: {{ .Values.tenant }}-db
spec:
  serviceName: "{{ .Values.tenant }}-db-svc"  # FIXED: Matches the Service name in service.yaml exactly
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.tenant }}-db
  template:
    metadata:
      labels:
        app: {{ .Values.tenant }}-db
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: postgres
          image: "{{ .Values.database.image.repository }}:{{ .Values.database.image.tag }}"
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            # Fetching Database Name directly from the ConfigMap (Single Source of Truth)
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.tenant }}-config
                  key: DATABASE_NAME
            # Fetching password securely from the Secret created by External Secrets (AWS Secrets Manager)
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.tenant }}-db-credentials
                  key: POSTGRES_PASSWORD
          resources:
            {{- toYaml .Values.database.resources | nindent 12 }}
          ports:
            - containerPort: 5432
              name: postgres
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
            - name: postgres-run
              mountPath: /var/run/postgresql
            - name: tmp
              mountPath: /tmp
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: postgres-run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: postgres-storage
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: {{ .Values.database.storageSize }}
  # Automatic DB backup strategy placeholder (Phase 6 implementation)
