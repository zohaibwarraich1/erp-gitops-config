{{- if and .Values.monitoring.enabled .Values.monitoring.alerts.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ .Values.tenant }}-erp-alerts
  namespace: {{ .Values.tenant }}
  labels:
    app: {{ .Values.tenant }}-erp
    # This label is required for kube-prometheus-stack to pick up the rule
    release: monitoring
spec:
  groups:
    - name: {{ .Values.tenant }}.erp.rules
      interval: 30s
      rules:

        # ─── 1. POD RESTARTS ────────────────────────────────────────────────────
        # Fires when any ERP container has restarted more than the threshold in 5m
        - alert: ERP_PodCrashLooping
          expr: |
            increase(
              kube_pod_container_status_restarts_total{
                namespace="{{ .Values.tenant }}",
                pod=~"{{ .Values.tenant }}-erp.*"
              }[5m]
            ) > {{ .Values.monitoring.alerts.podRestartThreshold }}
          for: 1m
          labels:
            severity: critical
            tenant: {{ .Values.tenant }}
          annotations:
            summary: "ERP pod is crash-looping (tenant: {{ .Values.tenant }})"
            description: >
              Pod {{ "{{" }} $labels.pod {{ "}}" }} in namespace {{ .Values.tenant }}
              has restarted more than {{ .Values.monitoring.alerts.podRestartThreshold }} times in the last 5 minutes.

        # ─── 2. HIGH CPU USAGE ──────────────────────────────────────────────────
        # Fires when CPU usage exceeds the threshold for 2 consecutive minutes
        - alert: ERP_HighCPUUsage
          expr: |
            (
              sum(rate(container_cpu_usage_seconds_total{
                namespace="{{ .Values.tenant }}",
                pod=~"{{ .Values.tenant }}-erp.*",
                container!=""
              }[5m])) by (pod)
              /
              sum(kube_pod_container_resource_limits{
                namespace="{{ .Values.tenant }}",
                pod=~"{{ .Values.tenant }}-erp.*",
                resource="cpu"
              }) by (pod)
            ) * 100 > {{ .Values.monitoring.alerts.cpuThresholdPercent }}
          for: 2m
          labels:
            severity: warning
            tenant: {{ .Values.tenant }}
          annotations:
            summary: "ERP pod high CPU usage (tenant: {{ .Values.tenant }})"
            description: >
              Pod {{ "{{" }} $labels.pod {{ "}}" }} CPU usage is above
              {{ .Values.monitoring.alerts.cpuThresholdPercent }}% for more than 2 minutes.

        # ─── 3. HIGH MEMORY USAGE ───────────────────────────────────────────────
        # Fires when Memory usage exceeds the threshold for 2 consecutive minutes
        - alert: ERP_HighMemoryUsage
          expr: |
            (
              sum(container_memory_working_set_bytes{
                namespace="{{ .Values.tenant }}",
                pod=~"{{ .Values.tenant }}-erp.*",
                container!=""
              }) by (pod)
              /
              sum(kube_pod_container_resource_limits{
                namespace="{{ .Values.tenant }}",
                pod=~"{{ .Values.tenant }}-erp.*",
                resource="memory"
              }) by (pod)
            ) * 100 > {{ .Values.monitoring.alerts.memoryThresholdPercent }}
          for: 2m
          labels:
            severity: warning
            tenant: {{ .Values.tenant }}
          annotations:
            summary: "ERP pod high Memory usage (tenant: {{ .Values.tenant }})"
            description: >
              Pod {{ "{{" }} $labels.pod {{ "}}" }} Memory usage is above
              {{ .Values.monitoring.alerts.memoryThresholdPercent }}% for more than 2 minutes.

        # ─── 4. HTTP 5XX ERRORS ─────────────────────────────────────────────────
        # Fires when NGINX ingress reports excessive 5xx responses for this tenant
        - alert: ERP_High5xxErrorRate
          expr: |
            sum(
              rate(nginx_ingress_controller_requests{
                exported_namespace="{{ .Values.tenant }}",
                status=~"5..",
                ingress="{{ .Values.tenant }}-ingress"
              }[5m])
            ) > {{ .Values.monitoring.alerts.http5xxThreshold }}
          for: 1m
          labels:
            severity: critical
            tenant: {{ .Values.tenant }}
          annotations:
            summary: "ERP high HTTP 5xx error rate (tenant: {{ .Values.tenant }})"
            description: >
              Ingress {{ .Values.tenant }}-ingress is returning more than
              {{ .Values.monitoring.alerts.http5xxThreshold }} HTTP 5xx errors per minute.

        # ─── 5. DB CONNECTIVITY ─────────────────────────────────────────────────
        # Fires when the tenant's PostgreSQL pod is NOT in Running state
        - alert: ERP_DatabaseDown
          expr: |
            kube_pod_status_phase{
              namespace="{{ .Values.tenant }}",
              pod=~"{{ .Values.tenant }}-db.*",
              phase!="Running"
            } == 1
          for: 1m
          labels:
            severity: critical
            tenant: {{ .Values.tenant }}
          annotations:
            summary: "ERP database pod is down (tenant: {{ .Values.tenant }})"
            description: >
              The PostgreSQL pod for tenant {{ .Values.tenant }} is not in Running phase.
              ERP application will lose database connectivity.
{{- end }}
