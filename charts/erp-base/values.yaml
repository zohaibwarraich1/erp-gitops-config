tenant: ali
domain: ali.zohaibofficial.online
db_name: erp_ali
replicas: 1
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi
image:
  repository: zohaibwarraich/erp-dummy-app
  tag: db19e58b99868f13055795633b63f48362df3ee9
  pullPolicy: Always
database:
  image:
    repository: postgres
    tag: 14-alpine
  storageSize: 2Gi
  resources:
    limits:
      cpu: 250m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
# Phase 4 - Observability & Reliability
monitoring:
  enabled: true
  # Prometheus scrape interval for this tenant's ERP app
  scrapeInterval: 30s
  # Grafana dashboard auto-loading (requires grafana sidecar enabled in kube-prometheus-stack)
  dashboard:
    enabled: true
  # Alert thresholds
  alerts:
    enabled: true
    podRestartThreshold: 3 # Alert if pod restarts > 3 times in 5m
    cpuThresholdPercent: 80 # Alert if CPU > 80%
    memoryThresholdPercent: 80 # Alert if Memory > 80%
    http5xxThreshold: 10 # Alert if HTTP 5xx errors > 10/min
# Phase 6 - Backup & Recovery
backup:
  enabled: true
  schedule: "0 2 * * *" # Daily at 2 AM
  retentionDays: 7
  storageSize: 5Gi
